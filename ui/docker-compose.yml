services:
  # Development service: runs Next.js dev server with host mounting for HMR
  ui-dev:
    image: node:20-alpine
    working_dir: /workspace
    volumes:
      - ../:/workspace:delegated
      - /workspace/node_modules
    ports:
      - "5173:5173"
    environment:
      # Enable polling on some macOS setups; optional
      - CHOKIDAR_USEPOLLING=true
      - API_BACKEND_URL=http://host.docker.internal:3001/api/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "COREPACK_ENABLE_DOWNLOAD_PROMPT=0 corepack enable && COREPACK_ENABLE_DOWNLOAD_PROMPT=0 corepack prepare pnpm@10.13.1 --activate && pnpm install --frozen-lockfile && pnpm --filter ui exec next dev -H 0.0.0.0 -p 5173"
    tty: true

  # Production service: build then serve with Next standalone runtime
  ui-prod:
    build:
      context: ..
      dockerfile: ui/Dockerfile
      target: runner
    ports:
      - "5173:3000"
    environment:
      - API_BACKEND_URL=${API_BACKEND_URL}
    restart: unless-stopped

networks:
  default:
    driver: bridge
